name: PAT Test Workflow
on: [push]

jobs:
  test_api_with_pat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify token access to repo info via API
        run: |
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.GH_PAT_MYPAGES }}" -H "X-GitHub-Api-Version: 2022-11-28" https://api.github.com/repos/${{ github.repository }})
          echo "API response code: $RESPONSE_CODE"
          if [ "$RESPONSE_CODE" -eq 200 ]; then
            echo "Successfully accessed repository info with PAT."
          else
            echo "Failed to access repository info with PAT. Response code: $RESPONSE_CODE"
            exit 1
          fi

      - name: Verify token access to user info via API
        run: |
          curl -H "Authorization: Bearer ${{ secrets.GH_PAT_MYPAGES }}" -H "X-GitHub-Api-Version: 2022-11-28" https://api.github.com/user
          # This call uses the PAT to get user info associated with the token.
          # The fine-grained PAT has implicit access to user details it's associated with.
